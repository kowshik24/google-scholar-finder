version: '3.8'

services:
  # Google Scholar Scraper App (works standalone with ScraperAPI or FreeProxies)
  scholar-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: google-scholar-scraper
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output
      - ./.env:/app/.env:ro
    environment:
      - CONNECTION_METHOD=${CONNECTION_METHOD:-scraperapi}
      - SCRAPERAPI_KEY=${SCRAPERAPI_KEY}
    restart: unless-stopped

